<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snake Forest</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;

    /* 🌲 evergreen forest background */
    background: url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=2000&q=80");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* dark overlay */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    z-index: -5;
}

/* 🧭 NAV BAR */
nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 15px 10px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(6px);
    z-index: 10;
}

nav a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
    transition: 0.2s;
}

nav a:hover {
    color: #00ff88;
}

/* title */
h2 {
    color: white;
    margin-top: 70px;
}

canvas {
    background: #111;
    border-radius: 12px;
    border: 3px solid #333;
}

#score {
    margin: 10px;
}

button {
    margin-top: 10px;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🧭 NAV BAR LINKS -->
<nav>
    <a href="index.html">Home</a>
    <a href="resume.html">Resume</a>
    <a href="ai.html">Snake Game</a>
    <a href="fromscratch.html">Highschool Jobs</a>
</nav>

<h2>Snake 🐍 Forest</h2>
<div id="score">Score: 0</div>

<canvas id="game" width="400" height="400"></canvas>
<div>Use arrow keys</div>
<button id="restartBtn" style="display:none;">Play Again</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const restartBtn = document.getElementById("restartBtn");

const grid = 20;
const size = canvas.width / grid;

let snake, velocity, apple, score, started, gameOver;

function init() {
    snake = [{ x: 10, y: 10 }];
    velocity = { x: 0, y: 0 };
    apple = spawn();
    score = 0;
    started = false;
    gameOver = false;
    scoreEl.textContent = "Score: 0";
    restartBtn.style.display = "none";
}
init();

document.addEventListener("keydown", (e) => {
    if (gameOver) return;
    if (!started) started = true;

    if (e.key === "ArrowUp" && velocity.y === 0) velocity = { x: 0, y: -1 };
    if (e.key === "ArrowDown" && velocity.y === 0) velocity = { x: 0, y: 1 };
    if (e.key === "ArrowLeft" && velocity.x === 0) velocity = { x: -1, y: 0 };
    if (e.key === "ArrowRight" && velocity.x === 0) velocity = { x: 1, y: 0 };
});

restartBtn.onclick = init;

function spawn() {
    return {
        x: Math.floor(Math.random() * size),
        y: Math.floor(Math.random() * size)
    };
}

function update() {
    if (!started) return;

    let head = {
        x: snake[0].x + velocity.x,
        y: snake[0].y + velocity.y
    };

    if (head.x < 0 || head.x >= size || head.y < 0 || head.y >= size) return end();

    for (let s of snake) {
        if (s.x === head.x && s.y === head.y) return end();
    }

    snake.unshift(head);

    if (head.x === apple.x && head.y === apple.y) {
        apple = spawn();
        score += 10;
        scoreEl.textContent = "Score: " + score;
    } else {
        snake.pop();
    }
}

function end() {
    gameOver = true;
    restartBtn.style.display = "block";
}

function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, 400, 400);

    ctx.strokeStyle = "#222";
    for (let i = 0; i <= grid; i++) {
        ctx.beginPath();
        ctx.moveTo(i * grid, 0);
        ctx.lineTo(i * grid, 400);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * grid);
        ctx.lineTo(400, i * grid);
        ctx.stroke();
    }

    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(apple.x * grid + 10, apple.y * grid + 10, 5, 0, Math.PI * 2);
    ctx.fill();

    for (let i = 0; i < snake.length; i++) {
        let x = snake[i].x * grid;
        let y = snake[i].y * grid;

        let head = i === 0;

        ctx.fillStyle = head ? "#00ff88" : "#00aa66";
        ctx.beginPath();
        ctx.arc(x + 10, y + 10, head ? 9 : 7, 0, Math.PI * 2);
        ctx.fill();

        if (head) {
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(x + 7, y + 8, 1.5, 0, Math.PI * 2);
            ctx.arc(x + 13, y + 8, 1.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = "red";
            ctx.beginPath();
            ctx.moveTo(x + 10, y + 12);
            ctx.lineTo(x + 10 + velocity.x * 6, y + 12 + velocity.y * 6);
            ctx.stroke();
        }
    }

    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, 400, 400);

        ctx.fillStyle = "white";
        ctx.font = "24px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", 200, 200);
    }
}

setInterval(() => {
    update();
    draw();
}, 90);
</script>

</body>
</html>
